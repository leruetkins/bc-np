<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bc-np - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <h1>bc-np</h1>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            <p id="error" class="error"></p>
        </form>
        <p style="text-align: center; margin-top: 1rem;">
            <a href="#" onclick="localStorage.removeItem('credentials'); window.location.reload();" style="font-size: 0.875rem;">Clear credentials & reload</a>
        </p>
    </div>
    <script>
        localStorage.removeItem('credentials');
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const credentials = btoa(username + ':' + password);

            try {
                const resp = await fetch('/api/status?_=' + Date.now(), {
                    headers: { 'Authorization': 'Basic ' + credentials }
                });
                if (resp.ok) {
                    localStorage.setItem('credentials', credentials);
                    window.location.href = '/ui/dashboard.html';
                } else {
                    document.getElementById('error').textContent = 'Invalid credentials';
                }
            } catch(err) {
                document.getElementById('error').textContent = 'Connection error: ' + err.message;
            }
        });
    </script>
</body>
</html>
